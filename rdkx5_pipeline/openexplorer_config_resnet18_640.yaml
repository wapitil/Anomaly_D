# OpenExplorer config for rdkx5_pipeline/02_export_feature_onnx.py
# Current matching scripts:
# - 02_export_feature_onnx.py: BACKBONE_NAME="resnet18", PROJECT="res_640"
# - 03_export_calibration_images.py: PROJECT="res_640"
#
# The calibration images are already letterbox-resized to 640x640 by Python.
# They are still RGB uint8 images, so mean/scale below reproduces:
#   (image / 255.0 - ImageNet_mean) / ImageNet_std

model_parameters:
  onnx_model: "runs/res_640/onnx/res_640.onnx"
  march: "bayes-e"
  layer_out_dump: False
  working_dir: "runs/res_640/openexplorer_output"
  output_model_file_prefix: "res_640_feature"

input_parameters:
  input_name: "input"

  # Runtime input is one RGB image tensor. Keep this consistent with your RDK code.
  input_type_rt: "rgb"
  input_layout_rt: "NCHW"

  # The ONNX was exported from PyTorch and trained with RGB/NCHW normalized tensors.
  input_type_train: "rgb"
  input_layout_train: "NCHW"
  input_shape: "1x3x640x640"

  # PyTorch preprocessing in core.py is:
  #   array = image / 255.0
  #   array = (array - [0.485, 0.456, 0.406]) / [0.229, 0.224, 0.225]
  # Equivalent uint8 preprocessing:
  #   (pixel - mean_value) * scale_value
  norm_type: "data_mean_and_scale"
  mean_value: "123.675 116.28 103.53"
  scale_value: "0.0171247538316637 0.0175070028011204 0.0174291938997821"

calibration_parameters:
  calibration_type: "default"

  # Use the folder generated by 03_export_calibration_images.py.
  # If your OpenExplorer version expects a different key name, keep the value
  # and move it to the calibration-data field required by that version.
  calibration_data_dir: "runs/res_640/calibration"

compiler_parameters:
  compile_mode: "latency"
  debug: True
  optimize_level: "O2"
